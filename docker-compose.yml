version: '3.8'

services:
  # Serviço da aplicação web
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=cotacao_user
      - DB_PASSWORD=cotacao_password
      - DB_NAME=cotacao_db
    networks:
      - cotacao-network

  # Serviço do banco de dados
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=cotacao_db
      - MYSQL_USER=cotacao_user
      - MYSQL_PASSWORD=cotacao_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cotacao-network

  # Serviço phpMyAdmin para gerenciamento do banco de dados
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - MYSQL_ROOT_PASSWORD=root_password
    depends_on:
      - db
    networks:
      - cotacao-network

networks:
  cotacao-network:
    driver: bridge

volumes:
  mysql_data: 